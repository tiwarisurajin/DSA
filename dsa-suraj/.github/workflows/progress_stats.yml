name: Progress Stats

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run progress stats
        run: python scripts/progress_stats.py
